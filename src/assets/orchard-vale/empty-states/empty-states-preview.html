<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orchard Vale Empty States And Spot Illustrations</title>
  <style>
    :root { --ink:#2f2417; --green:#2f6b3f; --paper:#f8edcf; --parchment:#f2e1b8; --wood:#6f4728; --brass:#c9962e; }
    body { margin:0; background:#2f3f2d; color:var(--ink); font-family:Georgia,"Times New Roman",serif; }
    main { max-width:1240px; margin:0 auto; padding:32px; }
    header { background:var(--green); color:#f8edcf; border:3px solid #1f2b1d; box-shadow:0 0 0 4px var(--brass),0 16px 32px rgba(0,0,0,.25); padding:18px 22px; margin-bottom:24px; }
    h1 { margin:0; font-size:30px; letter-spacing:0; }
    p { margin:8px 0 0; max-width:830px; line-height:1.45; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; }
    .asset-card { margin:0; background:var(--paper); border:2px solid var(--wood); box-shadow:inset 0 0 0 3px #dec58e,0 3px 0 rgba(0,0,0,.18); padding:12px; display:grid; gap:9px; align-content:start; }
    .art-box { height:210px; display:grid; place-items:center; background-color:var(--parchment); background-image:linear-gradient(45deg,#e2cc94 25%,transparent 25%),linear-gradient(-45deg,#e2cc94 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#e2cc94 75%),linear-gradient(-45deg,transparent 75%,#e2cc94 75%); background-size:22px 22px; background-position:0 0,0 11px,11px -11px,-11px 0; border:1px solid #c59d52; overflow:hidden; }
    .empty .art-box img { max-width:250px; max-height:188px; object-fit:contain; }
    .spot .art-box img { max-width:180px; max-height:180px; object-fit:contain; }
    figcaption { display:grid; gap:4px; text-align:center; }
    figcaption span { font-weight:700; font-size:14px; }
    code { font:11px/1.25 Consolas,monospace; overflow-wrap:anywhere; color:#5a3d24; }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Orchard Vale Empty States And Spot Illustrations</h1>
      <p>Category 8 transparent PNG assets for no-results states, completed workflows, message states, maintenance panels, and compact decorative spots.</p>
    </header>
    <section class="grid"><figure class="asset-card empty">
  <div class="art-box"><img src="empty-badger-checklist-complete-800.png" alt="Badger Checklist Complete"></div>
  <figcaption><span>Badger Checklist Complete</span><code>empty-badger-checklist-complete-800.png</code></figcaption>
</figure><figure class="asset-card empty">
  <div class="art-box"><img src="empty-deer-documentation-draft-800.png" alt="Deer Documentation Draft"></div>
  <figcaption><span>Deer Documentation Draft</span><code>empty-deer-documentation-draft-800.png</code></figcaption>
</figure><figure class="asset-card empty">
  <div class="art-box"><img src="empty-fox-mail-sorted-800.png" alt="Fox Mail Sorted"></div>
  <figcaption><span>Fox Mail Sorted</span><code>empty-fox-mail-sorted-800.png</code></figcaption>
</figure><figure class="asset-card empty">
  <div class="art-box"><img src="empty-mole-gears-inspection-800.png" alt="Mole Gears Inspection"></div>
  <figcaption><span>Mole Gears Inspection</span><code>empty-mole-gears-inspection-800.png</code></figcaption>
</figure><figure class="asset-card empty">
  <div class="art-box"><img src="empty-owl-ledger-no-results-800.png" alt="Owl Ledger No Results"></div>
  <figcaption><span>Owl Ledger No Results</span><code>empty-owl-ledger-no-results-800.png</code></figcaption>
</figure><figure class="asset-card empty">
  <div class="art-box"><img src="empty-rabbit-calendar-clear-800.png" alt="Rabbit Calendar Clear"></div>
  <figcaption><span>Rabbit Calendar Clear</span><code>empty-rabbit-calendar-clear-800.png</code></figcaption>
</figure><figure class="asset-card empty">
  <div class="art-box"><img src="empty-robin-note-delivery-800.png" alt="Robin Note Delivery"></div>
  <figcaption><span>Robin Note Delivery</span><code>empty-robin-note-delivery-800.png</code></figcaption>
</figure><figure class="asset-card empty">
  <div class="art-box"><img src="empty-squirrel-resources-organized-800.png" alt="Squirrel Resources Organized"></div>
  <figcaption><span>Squirrel Resources Organized</span><code>empty-squirrel-resources-organized-800.png</code></figcaption>
</figure><figure class="asset-card spot">
  <div class="art-box"><img src="spot-desk-quill-lantern-512.png" alt="Desk Quill Lantern"></div>
  <figcaption><span>Desk Quill Lantern</span><code>spot-desk-quill-lantern-512.png</code></figcaption>
</figure><figure class="asset-card spot">
  <div class="art-box"><img src="spot-notice-board-quiet-512.png" alt="Notice Board Quiet"></div>
  <figcaption><span>Notice Board Quiet</span><code>spot-notice-board-quiet-512.png</code></figcaption>
</figure></section>
  </main>
</body>
</html>
