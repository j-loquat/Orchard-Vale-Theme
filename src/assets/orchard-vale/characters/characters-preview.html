<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orchard Vale Illustrated Characters</title>
  <style>
    :root { --ink:#2f2417; --green:#2f6b3f; --paper:#f8edcf; --parchment:#f2e1b8; --wood:#6f4728; --brass:#c9962e; }
    body { margin:0; background:#2f3f2d; color:var(--ink); font-family:Georgia,"Times New Roman",serif; }
    main { max-width:1240px; margin:0 auto; padding:32px; }
    header { background:var(--green); color:#f8edcf; border:3px solid #1f2b1d; box-shadow:0 0 0 4px var(--brass),0 16px 32px rgba(0,0,0,.25); padding:18px 22px; margin-bottom:24px; }
    h1 { margin:0; font-size:30px; letter-spacing:0; }
    p { margin:8px 0 0; max-width:830px; line-height:1.45; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:14px; }
    .character-card { margin:0; background:var(--paper); border:2px solid var(--wood); box-shadow:inset 0 0 0 3px #dec58e,0 3px 0 rgba(0,0,0,.18); padding:12px; display:grid; gap:9px; align-content:start; }
    .art-box { height:190px; display:grid; place-items:center; background-color:var(--parchment); background-image:linear-gradient(45deg,#e2cc94 25%,transparent 25%),linear-gradient(-45deg,#e2cc94 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#e2cc94 75%),linear-gradient(-45deg,transparent 75%,#e2cc94 75%); background-size:22px 22px; background-position:0 0,0 11px,11px -11px,-11px 0; border:1px solid #c59d52; overflow:hidden; }
    .avatars .art-box img { width:156px; height:156px; object-fit:contain; }
    .fullbody .art-box img { max-width:170px; max-height:176px; object-fit:contain; }
    figcaption { display:grid; gap:4px; text-align:center; }
    figcaption span { font-weight:700; font-size:14px; }
    code { font:11px/1.25 Consolas,monospace; overflow-wrap:anywhere; color:#5a3d24; }
  </style>
</head>
