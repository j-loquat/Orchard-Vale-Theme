<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orchard Vale Data Visualization Ornament</title>
  <style>
    :root {
      --ink: #2f2417;
      --green: #2f6b3f;
      --paper: #f8edcf;
      --parchment: #f2e1b8;
      --wood: #6f4728;
      --brass: #c9962e;
    }
    body {
      margin: 0;
      background: #2f3f2d;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }
    main { max-width: 1240px; margin: 0 auto; padding: 32px; }
    header {
      background: var(--green);
      color: #f8edcf;
      border: 3px solid #1f2b1d;
      box-shadow: 0 0 0 4px var(--brass), 0 16px 32px rgba(0,0,0,.25);
      padding: 18px 22px;
      margin-bottom: 24px;
    }
    h1 { margin: 0; font-size: 30px; letter-spacing: 0; }
    p { margin: 8px 0 0; max-width: 820px; line-height: 1.45; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 14px; }
    .asset-card {
      margin: 0;
      background: var(--paper);
      border: 2px solid var(--wood);
      box-shadow: inset 0 0 0 3px #dec58e, 0 3px 0 rgba(0,0,0,.18);
      padding: 12px;
      min-height: 150px;
      display: grid;
      gap: 9px;
      align-content: start;
    }
    .asset-box {
      height: 72px;
      display: grid;
      place-items: center;
      background: var(--parchment);
      border: 1px solid #c59d52;
      overflow: hidden;
    }
    .asset-box img { max-width: 92%; max-height: 62px; }
    .wide .asset-box img { max-width: 96%; width: 150px; height: auto; }
    .tall .asset-box img { max-height: 68px; }
    figcaption { display: grid; gap: 4px; text-align: center; }
    figcaption span { font-weight: 700; font-size: 13px; }
    code { font: 11px/1.25 Consolas, monospace; overflow-wrap: anywhere; color: #5a3d24; }
  </style>
</head>
