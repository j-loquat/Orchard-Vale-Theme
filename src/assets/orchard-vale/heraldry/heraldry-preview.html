<!doctype html>
<html lang="en">
<head>

  <title>Orchard Vale Heraldry Preview</title>
  <style>
    body { margin: 0; padding: 24px; background: #efe1bd; color: #1b1208; font-family: Georgia, serif; }
    h1 { margin: 0 0 18px; font-size: 28px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 18px; }
    .card { margin: 0; padding: 12px; background: #f4e6c5; border: 2px solid #2b1a0b; box-shadow: inset 0 0 0 1px #c7942f; }
    .preview { height: 176px; display: grid; place-items: center; background: #ead2a3; border: 1px solid #8b6530; overflow: hidden; }
    img { max-width: 92%; max-height: 92%; }
    figcaption { margin-top: 8px; font: 12px/1.35 Consolas, monospace; overflow-wrap: anywhere; }
  </style>
</head>
